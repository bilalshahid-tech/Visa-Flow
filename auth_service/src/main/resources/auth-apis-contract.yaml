openapi: 3.0.0
info:
  title: VisaFlow Auth Service API
  description: Authentication and Authorization API for VisaFlow Platform
  version: 1.0.0
  contact:
    name: Bilal
    email: bilal@visaflow.com

servers:
  - url: http://localhost:8081/api/auth
    description: Local development server
  - url: https://api.visaflow.com/v1/auth
    description: Production server

tags:
  - name: Authentication
    description: Login, Register, Token refresh
  - name: Password Management
    description: Forgot password, Reset password
  - name: User Management
    description: User profile and account management
  - name: Internal
    description: Internal endpoints for service-to-service communication

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshTokenAuth:
      type: apiKey
      in: header
      name: X-Refresh-Token

  schemas:
    # Request/Response DTOs
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: consultant@visaflow.com
        password:
          type: string
          format: password
          example: "SecurePass123!"
        rememberMe:
          type: boolean
          default: false

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - role
      properties:
        email:
          type: string
          format: email
          example: john.doe@example.com
        password:
          type: string
          format: password
          minLength: 8
          pattern: "^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=])(?=\\S+$).{8,}$"
          description: Must contain at least 8 characters, one digit, one uppercase, one lowercase, and one special character
        firstName:
          type: string
          example: "John"
        lastName:
          type: string
          example: "Doe"
        role:
          type: string
          enum: [CONSULTANT, CLIENT, ADMIN]
          default: CLIENT
        companyName:
          type: string
          description: Required if role is CONSULTANT (for company onboarding)
          example: "Global Visa Consultants"
        phoneNumber:
          type: string
          example: "+1234567890"

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token (expires in 15 minutes)
        refreshToken:
          type: string
          description: Refresh token (expires in 7 days)
        tokenType:
          type: string
          default: "Bearer"
        expiresIn:
          type: integer
          description: Token expiry in seconds
          example: 900
        user:
          $ref: '#/components/schemas/UserDTO'

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: Valid refresh token

    UserDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        roles:
          type: array
          items:
            type: string
          example: ["CONSULTANT"]
        companyId:
          type: string
          format: uuid
        companyName:
          type: string
        enabled:
          type: boolean
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          description: Password reset token received via email
        newPassword:
          type: string
          format: password
          minLength: 8

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 8

    VerifyEmailRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Invalid credentials"
        path:
          type: string
          example: "/api/auth/login"

    # Internal service DTOs
    InternalUserValidationRequest:
      type: object
      required:
        - userId
        - requiredRoles
      properties:
        userId:
          type: string
          format: uuid
        requiredRoles:
          type: array
          items:
            type: string
        requiredPermissions:
          type: array
          items:
            type: string

    InternalUserValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
        user:
          $ref: '#/components/schemas/UserDTO'
        hasRequiredRoles:
          type: boolean
        hasRequiredPermissions:
          type: boolean

paths:
  # Public endpoints
  /login:
    post:
      tags: [Authentication]
      summary: Authenticate user and get tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account locked or not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /register:
    post:
      tags: [Authentication]
      summary: Register new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /refresh:
    post:
      tags: [Authentication]
      summary: Get new access token using refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  tokenType:
                    type: string
                  expiresIn:
                    type: integer
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /logout:
    post:
      tags: [Authentication]
      summary: Logout user (invalidate refresh token)
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Successfully logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logged out successfully"

  /verify-email:
    post:
      tags: [Authentication]
      summary: Verify user email address
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Invalid or expired token

  /resend-verification:
    post:
      tags: [Authentication]
      summary: Resend email verification link
      operationId: resendVerification
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification email sent
        '429':
          description: Too many requests

  # Password Management
  /forgot-password:
    post:
      tags: [Password Management]
      summary: Request password reset link
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: If email exists, reset link sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "If email exists, reset link sent"

  /reset-password:
    post:
      tags: [Password Management]
      summary: Reset password using token
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid or expired token

  /change-password:
    post:
      tags: [Password Management]
      summary: Change password (authenticated user)
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: Current password incorrect or validation error

  # User Profile (Authenticated)
  /me:
    get:
      tags: [User Management]
      summary: Get current user profile
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '401':
          description: Unauthorized

    put:
      tags: [User Management]
      summary: Update current user profile
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phoneNumber:
                  type: string
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'

  # Internal endpoints (for service-to-service communication)
  /internal/validate:
    post:
      tags: [Internal]
      summary: Validate user and permissions (internal use only)
      operationId: validateUserInternal
      parameters:
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
          description: Internal API key for service authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalUserValidationRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalUserValidationResponse'
        '403':
          description: Invalid API key

  /internal/users/{userId}:
    get:
      tags: [Internal]
      summary: Get user by ID (internal)
      operationId: getUserByIdInternal
      parameters:
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '404':
          description: User not found